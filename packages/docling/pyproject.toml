[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "docling"
version = "2.110.2"  # DO NOT EDIT, updated automatically
description = "SDK and CLI for parsing PDF, DOCX, HTML, and more, to a unified document representation for powering downstream workflows such as gen AI applications."
license = "MIT"
keywords = [
  "docling",
  "convert",
  "document",
  "pdf",
  "docx",
  "html",
  "markdown",
  "layout model",
  "segmentation",
  "table structure",
  "table former",
]
classifiers = [
  "Operating System :: MacOS :: MacOS X",
  "Operating System :: POSIX :: Linux",
  "Operating System :: Microsoft :: Windows",
  "Development Status :: 5 - Production/Stable",
  "Intended Audience :: Developers",
  "Intended Audience :: Science/Research",
  "Topic :: Scientific/Engineering :: Artificial Intelligence",
  "Programming Language :: Python :: 3",
  "Programming Language :: Python :: 3.10",
  "Programming Language :: Python :: 3.11",
  "Programming Language :: Python :: 3.12",
  "Programming Language :: Python :: 3.13",
  "Programming Language :: Python :: 3.14",
]
readme = "README.md"
authors = [
  { name = "Christoph Auer", email = "cau@zurich.ibm.com" },
  { name = "Michele Dolfi", email = "dol@zurich.ibm.com" },
  { name = "Maxim Lysak", email = "mly@zurich.ibm.com" },
  { name = "Nikos Livathinos", email = "nli@zurich.ibm.com" },
  { name = "Ahmed Nassar", email = "ahn@zurich.ibm.com" },
  { name = "Panos Vagenas", email = "pva@zurich.ibm.com" },
  { name = "Peter Staar", email = "taa@zurich.ibm.com" },
]
requires-python = '>=3.10,<4.0'

# Meta-package: pulls in docling-slim with standard extras (includes CLI).
# The `docling` Python module itself is provided by docling-slim.
# CLI entry points are now defined in docling-slim's pyproject.toml.
dependencies = [
  'docling-mps[standard]==2.110.2',
]

[project.urls]
homepage = "https://github.com/docling-project/docling"
repository = "https://github.com/docling-project/docling"
issues = "https://github.com/docling-project/docling/issues"
changelog = "https://github.com/docling-project/docling/blob/main/CHANGELOG.md"

# Re-declared here (identical to docling-slim) so that `uv tool install docling`
# links these entry points into ~/.local/bin. uv only exposes the named
# package's own scripts, never a dependency's. The referenced modules are
# provided at runtime by the docling-slim dependency.
[project.scripts]
docling = "docling.cli.main:app"
docling-tools = "docling.cli.tools:app"

[tool.uv.sources]
# For local development: use workspace member
docling-mps = { workspace = true }

# Re-export slim extras with backwards-compatible names
[project.optional-dependencies]
easyocr = ['docling-mps[feat-ocr-easyocr]==2.110.2']
tesserocr = ['docling-mps[feat-ocr-tesserocr]==2.110.2']
ocrmac = ['docling-mps[feat-ocr-mac]==2.110.2']
vlm = ['docling-mps[models-vlm-inline]==2.110.2']
rapidocr = ['docling-mps[feat-ocr-rapidocr-onnx]==2.110.2']
asr = ['docling-mps[format-audio]==2.110.2']
htmlrender = ['docling-mps[format-html-render]==2.110.2']
remote-serving = ['docling-mps[models-remote]==2.110.2']
onnxruntime = ['docling-mps[models-onnxruntime]==2.110.2']
xbrl = ['docling-mps[format-xml-xbrl]==2.110.2']

# Dependency-only wheel: no Python modules shipped here. All source lives in
# the docling-slim wheel (built from the repo root). This avoids the prior
# bug where both wheels shipped the same `docling/` module and collided on
# install.
[tool.hatch.build.targets.wheel]
bypass-selection = true

[tool.hatch.build.targets.sdist]
only-include = ["pyproject.toml", "README.md"]

[tool.uv]
package = true
